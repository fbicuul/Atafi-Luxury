services:
  - type: web
    name: atafi-luxury
    env: static
    buildCommand: echo "Static site, no build needed"
    staticPublishPath: .
    headers:
      - path: /css/*
        name: Content-Type
        value: text/css
      - path: /js/*
        name: Content-Type
        value: application/javascript
      - path: /*
        name: X-Content-Type-Options
        value: nosniff