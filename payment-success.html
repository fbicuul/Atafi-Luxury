<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Success - Atafi Luxury</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="payment-success">
        <div class="success-card">
            <div class="success-icon">✓</div>
            <h1>Payment Successful!</h1>
            <p>Thank you for joining Atafi Luxury. Your journey to business growth begins now.</p>
            <div class="spinner" style="width: 30px; height: 30px; margin: 20px auto;"></div>
            <p>Redirecting you to your dashboard...</p>
            <p><small>Reference: <span id="reference"></span></small></p>
        </div>
    </div>

    <script>
        const reference = new URLSearchParams(window.location.search).get('reference');
        if (reference) {
            document.getElementById('reference').textContent = reference;
        }
        setTimeout(() => window.location.href = '/', 5000);
    </script>
</body>
</html>
